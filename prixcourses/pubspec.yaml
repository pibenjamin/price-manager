name: prixcourses
description: Grocery price comparison app using crowd-sourced data
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP Client
  dio: ^5.4.0

  # Barcode Scanner
  mobile_scanner: ^4.0.1

  # Charts
  fl_chart: ^0.66.0

  # UI Utilities
  intl: ^0.18.1
  cached_network_image: ^3.3.1

  # Supabase (for Phase 2)
  supabase_flutter: ^2.3.2

  # Utils
  uuid: ^4.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
